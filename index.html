<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>語彙練習 — Vocab Writing Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #faf7f2;
    --surface2: #ede8df;
    --border: #d6cfc3;
    --text: #2a2520;
    --text-muted: #7a7068;
    --accent: #c0392b;
    --accent-soft: #f5dbd9;
    --used-bg: #d4edda;
    --used-border: #a8d5b5;
    --used-text: #1e5c33;
    --tag-bg: #e8e2d8;
    --tag-text: #3a342c;
    --highlight: #ffe58a;
    --shadow: 0 2px 12px rgba(42,37,32,0.08);
  }

  [data-theme="dark"] {
    --bg: #1a1714;
    --surface: #221f1b;
    --surface2: #2c2825;
    --border: #3d3830;
    --text: #e8e0d5;
    --text-muted: #8a8178;
    --accent: #e05c4e;
    --accent-soft: #3d1f1c;
    --used-bg: #1a3326;
    --used-border: #2d5c40;
    --used-text: #6ec98a;
    --tag-bg: #2c2825;
    --tag-text: #d4cabf;
    --highlight: #5a4a00;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  /* Dark mode toggle button */
  #theme-toggle {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #theme-toggle:hover { color: var(--text); border-color: var(--text-muted); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 1.3rem;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  header span {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  header .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn:hover { background: var(--surface2); border-color: #b0a898; }
  .btn.danger { border-color: var(--accent); color: var(--accent); }
  .btn.danger:hover { background: var(--accent-soft); }

  #file-input, #save-file-input { display: none; }

  /* ── Word Panel ── */
  #word-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    max-height: 280px;
    overflow-y: auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    user-select: none;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .section-header:hover { color: var(--text); }
  .section-header .chevron {
    transition: transform 0.2s;
    font-size: 0.6rem;
  }
  .section-header .count-badge {
    background: var(--border);
    color: var(--text-muted);
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 0.65rem;
  }
  .section-header.used-header .count-badge {
    background: var(--used-bg);
    color: var(--used-text);
    border: 1px solid var(--used-border);
  }

  .section-body {
    padding: 10px 16px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 20px;
  }
  .section-body.collapsed { display: none; }

  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* ── Tags ── */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px 3px 10px;
    border-radius: 100px;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .tag.unused {
    background: var(--tag-bg);
    color: var(--tag-text);
    border-color: var(--border);
  }
  .tag.used {
    background: var(--used-bg);
    color: var(--used-text);
    border-color: var(--used-border);
  }
  .tag .remove-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    opacity: 0.45;
    font-size: 0.75rem;
    line-height: 1;
    padding: 0 1px;
    transition: opacity 0.15s;
    font-family: monospace;
  }
  .tag .remove-btn:hover { opacity: 1; }

  .empty-hint {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-style: italic;
    padding: 2px 0;
  }

  /* ── Add word row ── */
  #add-word-row {
    padding: 6px 16px 10px;
    display: flex;
    gap: 8px;
    align-items: center;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  #word-input {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }
  #word-input:focus { border-color: #998f83; }
  #word-input::placeholder { color: var(--text-muted); }

  /* ── Editor ── */
  #editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #editor-toolbar {
    display: flex;
    gap: 2px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .tb-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }
  .tb-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .tb-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .tb-sep { width: 1px; background: var(--border); margin: 2px 4px; }

  #editor {
    flex: 1;
    padding: 28px 40px;
    outline: none;
    font-size: 1.05rem;
    line-height: 1.9;
    overflow-y: auto;
    background: var(--bg);
    caret-color: var(--accent);
  }
  #editor:empty::before {
    content: attr(data-placeholder);
    color: var(--text-muted);
    pointer-events: none;
    font-style: italic;
  }

  /* Highlighted words inside the editor */
  .vocab-hit {
    background: var(--highlight);
    border-radius: 3px;
    padding: 0 1px;
    font-weight: 500;
  }

  .btn-divider { width: 1px; background: var(--border); margin: 0 2px; height: 20px; align-self: center; }

  /* ── Status bar ── */
  #status-bar {
    padding: 4px 20px;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>語彙練習</h1>
  <span>vocab writing practice</span>
  <div class="header-actions">
    <button class="btn" id="save-btn">↓ save</button>
    <button class="btn" id="load-btn">↑ load</button>
    <input type="file" id="save-file-input" accept=".json">
    <div class="btn-divider"></div>
    <button class="btn" id="import-btn">⤓ import .txt</button>
    <input type="file" id="file-input" accept=".txt">
    <button class="btn danger" id="clear-all-btn">✕ clear all words</button>
    <button id="theme-toggle" title="Toggle dark mode">☀︎</button>
  </div>
</header>

<!-- Unused section -->
<div id="word-panel">
  <div class="section-header" id="unused-header">
    <span class="chevron" id="unused-chevron">▼</span>
    unused
    <span class="count-badge" id="unused-count">0</span>
  </div>
  <div class="section-body" id="unused-tags">
    <span class="empty-hint">no words yet — add some below or import a .txt</span>
  </div>

  <hr class="section-divider">

  <div class="section-header used-header" id="used-header">
    <span class="chevron" id="used-chevron">▼</span>
    used
    <span class="count-badge" id="used-count">0</span>
  </div>
  <div class="section-body" id="used-tags">
    <span class="empty-hint">words you've typed will appear here</span>
  </div>
</div>

<!-- Add word row -->
<div id="add-word-row">
  <input type="text" id="word-input" placeholder="add a word… (press Enter)">
  <button class="btn" id="add-word-btn">+ add</button>
</div>

<!-- Editor -->
<div id="editor-wrap">
  <div id="editor-toolbar">
    <button class="tb-btn" data-cmd="bold" title="Bold"><b>B</b></button>
    <button class="tb-btn" data-cmd="italic" title="Italic"><i>I</i></button>
    <button class="tb-btn" data-cmd="underline" title="Underline"><u>U</u></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" data-cmd="insertUnorderedList" title="Bullet list">≡</button>
    <button class="tb-btn" data-cmd="insertOrderedList" title="Numbered list">1.</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" data-cmd="justifyLeft" title="Left">⬤←</button>
    <button class="tb-btn" data-cmd="justifyCenter" title="Center">⬤</button>
    <button class="tb-btn" data-cmd="justifyRight" title="Right">→⬤</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="clear-editor-btn" title="Clear editor">✕ clear text</button>
  </div>
  <div id="editor" contenteditable="true" data-placeholder="Start writing in Japanese… words from your list will be highlighted as you use them."></div>
</div>

<div id="status-bar">
  <span id="stat-words">words: 0</span>
  <span id="stat-chars">chars: 0</span>
  <span id="stat-used">vocab used: 0 / 0</span>
  <span id="stat-autosave" style="margin-left:auto; opacity:0; transition: opacity 0.5s;">autosaved</span>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let words = []; // { text: string, used: boolean }
  let unusedCollapsed = false;
  let usedCollapsed = false;

  const editor = document.getElementById('editor');
  const wordInput = document.getElementById('word-input');

  // ── Autosave (declared early so renderTags can call it) ───────────────────
  let autosaveTimer = null;
  const autosaveIndicator = document.getElementById('stat-autosave');

  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => {
      try {
        localStorage.setItem('goi-autosave', JSON.stringify(buildSaveData()));
        autosaveIndicator.style.opacity = '1';
        setTimeout(() => { autosaveIndicator.style.opacity = '0'; }, 1500);
      } catch (e) { /* quota exceeded or unavailable */ }
    }, 1000);
  }

  // ── Word management ────────────────────────────────────────────────────────

  function normalizeWord(w) {
    return w.trim();
  }

  function addWord(text) {
    const w = normalizeWord(text);
    if (!w) return;
    if (words.some(x => x.text === w)) return; // no duplicates
    words.push({ text: w, used: false });
    renderTags();
    recheckEditor();
  }

  function removeWord(text) {
    words = words.filter(w => w.text !== text);
    renderTags();
    recheckEditor();
  }

  function clearAllWords() {
    if (!confirm('Remove all words from the list?')) return;
    words = [];
    renderTags();
    recheckEditor();
  }

  // ── Render tags ────────────────────────────────────────────────────────────

  function renderTags() {
    const unusedList = words.filter(w => !w.used);
    const usedList = words.filter(w => w.used);

    renderSection('unused-tags', unusedList, 'unused');
    renderSection('used-tags', usedList, 'used');

    document.getElementById('unused-count').textContent = unusedList.length;
    document.getElementById('used-count').textContent = usedList.length;
    updateStats();
    scheduleAutosave();
  }

  function renderSection(containerId, list, type) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    if (list.length === 0) {
      const hint = document.createElement('span');
      hint.className = 'empty-hint';
      hint.textContent = type === 'unused'
        ? 'no unused words'
        : 'words you\'ve typed will appear here';
      container.appendChild(hint);
      return;
    }
    list.forEach(w => {
      const tag = document.createElement('span');
      tag.className = `tag ${type}`;
      tag.dataset.word = w.text;

      const label = document.createElement('span');
      label.textContent = w.text;

      const rm = document.createElement('button');
      rm.className = 'remove-btn';
      rm.textContent = '✕';
      rm.title = 'Remove word';
      rm.addEventListener('click', (e) => {
        e.stopPropagation();
        removeWord(w.text);
      });

      tag.appendChild(label);
      tag.appendChild(rm);
      container.appendChild(tag);
    });
  }

  // ── Editor highlight logic ─────────────────────────────────────────────────

  // Extract plain text from editor, considering the DOM
  function getEditorText() {
    return editor.innerText || editor.textContent || '';
  }

  // After any edit, figure out which words are "used"
  function recheckEditor() {
    const raw = getEditorText();
    let changed = false;
    words.forEach(w => {
      // For Japanese/CJK words, just check containment; for latin-script, word-boundary aware
      const isUsed = containsWord(raw, w.text);
      if (isUsed !== w.used) {
        w.used = isUsed;
        changed = true;
      }
    });
    if (changed) renderTags();
    updateStats();
  }

  function containsWord(text, word) {
    if (!word) return false;
    // If word contains any CJK / kana / kanji characters, just do substring match
    if (/[\u3000-\u9FFF\uF900-\uFAFF\uFF00-\uFFEF]/.test(word)) {
      return text.includes(word);
    }
    // Latin-script: whole-word match (case-insensitive)
    try {
      const re = new RegExp(`(?<![\\w\\u3040-\\u30FF\\u4E00-\\u9FFF])${escapeRegex(word)}(?![\\w\\u3040-\\u30FF\\u4E00-\\u9FFF])`, 'i');
      return re.test(text);
    } catch {
      return text.toLowerCase().includes(word.toLowerCase());
    }
  }

  function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // ── Stats ──────────────────────────────────────────────────────────────────

  function updateStats() {
    const text = getEditorText();
    const charCount = text.replace(/\s/g, '').length;
    // rough word count: split on whitespace + Japanese segmentation hint
    const wordCount = text.trim() === '' ? 0 : text.trim().split(/[\s\u3000]+/).filter(Boolean).length;
    const usedCount = words.filter(w => w.used).length;
    document.getElementById('stat-words').textContent = `words: ${wordCount}`;
    document.getElementById('stat-chars').textContent = `chars: ${charCount}`;
    document.getElementById('stat-used').textContent = `vocab used: ${usedCount} / ${words.length}`;
  }

  // ── Editor events ──────────────────────────────────────────────────────────

  editor.addEventListener('input', () => {
    recheckEditor();
  });

  // Toolbar
  document.querySelectorAll('[data-cmd]').forEach(btn => {
    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      document.execCommand(btn.dataset.cmd, false, null);
      editor.focus();
    });
  });

  document.getElementById('clear-editor-btn').addEventListener('click', () => {
    if (!confirm('Clear the editor text?')) return;
    editor.innerHTML = '';
    recheckEditor();
  });

  // ── Add word ───────────────────────────────────────────────────────────────

  document.getElementById('add-word-btn').addEventListener('click', () => {
    addWord(wordInput.value);
    wordInput.value = '';
    wordInput.focus();
  });

  wordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addWord(wordInput.value);
      wordInput.value = '';
    }
  });

  // ── Import .txt ────────────────────────────────────────────────────────────

  document.getElementById('import-btn').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });

  document.getElementById('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      // Split only on newlines and commas — NOT spaces, so multi-char words stay intact
      const tokens = text.split(/[\n\r,]+/).map(s => s.trim()).filter(Boolean);
      tokens.forEach(addWord);
    };
    reader.readAsText(file);
    e.target.value = ''; // reset so same file can be re-imported
  });

  // ── Clear all ──────────────────────────────────────────────────────────────

  document.getElementById('clear-all-btn').addEventListener('click', clearAllWords);

  // ── Collapse toggles ───────────────────────────────────────────────────────

  document.getElementById('unused-header').addEventListener('click', () => {
    unusedCollapsed = !unusedCollapsed;
    const body = document.getElementById('unused-tags');
    const chevron = document.getElementById('unused-chevron');
    body.classList.toggle('collapsed', unusedCollapsed);
    chevron.textContent = unusedCollapsed ? '▶' : '▼';
  });

  document.getElementById('used-header').addEventListener('click', () => {
    usedCollapsed = !usedCollapsed;
    const body = document.getElementById('used-tags');
    const chevron = document.getElementById('used-chevron');
    body.classList.toggle('collapsed', usedCollapsed);
    chevron.textContent = usedCollapsed ? '▶' : '▼';
  });

  // ── Save / Load ────────────────────────────────────────────────────────────

  function buildSaveData() {
    return {
      version: 1,
      savedAt: new Date().toISOString(),
      words: words.map(w => w.text),
      editorHTML: editor.innerHTML,
    };
  }

  function applySaveData(data) {
    if (!data || data.version !== 1) { alert('Unrecognised save file.'); return; }
    words = (data.words || []).map(t => ({ text: t, used: false }));
    editor.innerHTML = data.editorHTML || '';
    recheckEditor();
    renderTags();
  }

  // Manual save → downloads a .json file
  document.getElementById('save-btn').addEventListener('click', () => {
    const json = JSON.stringify(buildSaveData(), null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `goi-renshu-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // Manual load → reads a .json save file
  document.getElementById('load-btn').addEventListener('click', () => {
    document.getElementById('save-file-input').click();
  });

  document.getElementById('save-file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (editor.innerHTML.trim() || words.length) {
          if (!confirm('Loading a save will replace your current session. Continue?')) return;
        }
        applySaveData(data);
      } catch {
        alert('Could not parse save file — make sure it\'s a valid .json save.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  editor.addEventListener('input', scheduleAutosave);

  // Restore autosave on page load
  try {
    const saved = localStorage.getItem('goi-autosave');
    if (saved) {
      const data = JSON.parse(saved);
      applySaveData(data);
    }
  } catch (e) { /* ignore */ }

  // ── Theme toggle ───────────────────────────────────────────────────────────

  const themeToggle = document.getElementById('theme-toggle');
  const savedTheme = localStorage.getItem('goi-theme') || 'light';
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeToggle.textContent = '☽';
  }

  themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      themeToggle.textContent = '☀︎';
      localStorage.setItem('goi-theme', 'light');
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeToggle.textContent = '☽';
      localStorage.setItem('goi-theme', 'dark');
    }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  renderTags();
  updateStats();
</script>
</body>
</html>
